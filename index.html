<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>茨祭投票フォーム</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(
135deg,
#ff6ec4,
#7873f5,
#4facfe,
#43e97b
);
background-size:400% 400%;
animation:bg 12s ease infinite;
padding:20px;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
max-width:700px;
margin:auto;
background:rgba(255,255,255,0.95);
padding:30px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h1{
text-align:center;
margin-bottom:10px;
font-size:2rem;
}

.subtitle{
text-align:center;
margin-bottom:25px;
color:#666;
}

.question{
margin-top:25px;
margin-bottom:10px;
font-weight:bold;
font-size:1.1rem;
}

select{
width:100%;
padding:15px;
font-size:16px;
border-radius:12px;
border:2px solid #ddd;
}

button{
width:100%;
margin-top:30px;
padding:16px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:15px;
background:linear-gradient(
90deg,
#ff6ec4,
#7873f5
);
color:white;
cursor:pointer;
}

button:hover{
transform:scale(1.02);
}

#message{
margin-top:20px;
text-align:center;
font-weight:bold;
}

</style>
</head>

<body>

<div class="card">

<h1> 茨祭投票フォーム </h1>

<p class="subtitle">
ご来場ありがとうございます！
お気に入りを選んで投票してください。
</p>

<div class="question">
1. 一つ選択してください（企画投票）
</div>

<select id="projectVote"></select>

<div class="question">
2. 一つ選択してください（ポスター投票）
</div>

<select id="posterVote"></select>

<button onclick="submitVote()">
投票する
</button>

<div id="message"></div>

</div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbw6nRKeqLFi3aJSXLb5ybklfyqkZIvt-ELwR970z2VRxvI1MulGXc87mX7-tfnsYngHoQ/exec";

const projectOptions = [

["1-A","1-A　３番出口"],
["1-B","1-B　呪われたハマムラ研究所 ーずっといっしょだよ♡ー"],
["1-C","1-C　Chihiro's Casino"],
["1-D","1-D　ナカヤマの野望　〜シューティングアドベンチャー〜"],
["1-E","1-E　８番出口"],
["1-F","1-F　灯華縁日"],
["1-G","1-G　ハラと雪の女王"],
["2-A","2-A　ミッションインカベップル"],
["2-B","2-B　２８年の呪い"],
["2-C","2-C　TSUBOY STORY MANIA"],
["2-D","2-D　パイレーツ・オブ・ヤスコ"],
["2-E","2-E　ハラリン〜ドラマティック・フライト７７７〜"],
["2-F","2-F　サバイバルゲーム(仮)"],
["2-G","2-G　GLAC６期生 オンライン座談会"],
["3-A","3-A　スーパー エンジュン ブラザーズ"],
["3-B","3-B　としこガン　〜War on the sky〜"],
["3-C","3-C　GLAC HAZARD　〜感染区域〜"],
["3-D","3-D　Room 240　〜生存確率0.00%〜"],
["3-E","3-E　栗ニック"],
["3-F","3-F　ASTRO MISSION"]

];

const posterOptions = [

...projectOptions,

["図書","図書委員とあそぼ〜図書館人狼・栞作り編〜"],
["美術部","作品展示・ワークショップ"],
["JRC部","スマイルクッキープロジェクト"],
["フォーク部","軽音ライブ"],
["史学部","「筑波道」に刻まれた記憶"],
["吹奏楽部","吹奏楽部Pops Stage"],
["ESS部","放課後シネマ @ESS"],
["生物部","そうきたか！生物部"],
["漫画研究部","追憶の欠片〜紡がれる2つの物語〜"],
["放送部","カラオケ Chiki Ban! / 茨高放送部店"],
["競技かるた部","競技かるたの札でそろえろ！かるたBINGO！"],
["化学部","サイエンス・ワンダーランド"],
["C研","ｳﾜｱｱｱｱ!C研ﾃﾞﾙｼﾞﾊﾞｾﾞﾖ!!"],
["囲碁将棋部","茨高将棋道場"]

];

function fillSelect(id,data){

const select =
document.getElementById(id);

select.innerHTML =
'<option value="">選択してください</option>';

data.forEach(item=>{

const option =
document.createElement("option");

option.value = item[0];
option.textContent = item[1];

select.appendChild(option);

});

}

fillSelect("projectVote",projectOptions);
fillSelect("posterVote",posterOptions);

if(localStorage.getItem("ibasai_voted")){

document.body.innerHTML = `
<div style="
text-align:center;
margin-top:100px;
font-size:1.5rem;
color:white;">
🎉 投票済みです！<br><br>
ご協力ありがとうございました。
</div>
`;

}

async function submitVote(){

const projectVote =
document.getElementById("projectVote").value;

const posterVote =
document.getElementById("posterVote").value;

if(!projectVote || !posterVote){

alert("両方選択してください");

return;
}

try{

await fetch(
SCRIPT_URL,
{
method:"POST",
body:JSON.stringify({
projectVote,
posterVote
})
}
);

localStorage.setItem(
"ibasai_voted",
"true"
);

document.querySelector(".card").innerHTML=`
<h1>🎉</h1>
<h2 style="text-align:center;">
投票ありがとうございました！
</h2>
<p style="text-align:center;margin-top:20px;">
ご来場ありがとうございました！
</p>
`;

}catch(e){

document.getElementById("message")
.innerText =
"送信に失敗しました";

}

}

</script>

</body>
</html>
